 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sree AI Operator \u2014 Next-Gen Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060810;
    --bg2: #0c1020;
    --bg3: #111827;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --danger: #ef4444;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #475569;
    --glow: 0 0 30px rgba(0,229,255,0.15);
    --glow2: 0 0 30px rgba(124,58,237,0.15);
    --r: 12px;
    --r2: 8px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* \u2500\u2500\u2500 ONBOARDING OVERLAY \u2500\u2500\u2500 */
  #onboarding {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .ob-card {
    width: min(520px, 92vw);
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }
  .ob-card::before {
    content:'';
    position:absolute; top:-60px; right:-60px;
    width:200px; height:200px;
    background: radial-gradient(circle, rgba(0,229,255,0.12), transparent 70%);
    pointer-events:none;
  }
  .ob-steps { display:flex; gap:8px; margin-bottom:32px; }
  .ob-step { flex:1; height:3px; border-radius:2px; background: var(--border2); transition:.3s; }
  .ob-step.active { background: var(--accent); }
  .ob-step.done { background: var(--accent3); }
  .ob-title { font-size:1.5rem; font-weight:800; margin-bottom:8px; line-height:1.3; }
  .ob-title span { color: var(--accent); }
  .ob-sub { font-size:.875rem; color:var(--text2); margin-bottom:28px; line-height:1.6; }
  .ob-label { font-size:.75rem; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text2); margin-bottom:8px; }
  .ob-input {
    width:100%; background: var(--bg3);
    border: 1px solid var(--border2); border-radius: var(--r2);
    padding: 12px 16px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size:.85rem;
    outline:none; transition:.2s;
  }
  .ob-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.1); }
  .ob-row { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .ob-chip {
    padding: 8px 16px; border-radius:99px;
    border: 1px solid var(--border2); background: var(--bg3);
    font-size:.8rem; cursor:pointer; transition:.2s; color: var(--text2);
  }
  .ob-chip.sel { border-color: var(--accent); background: rgba(0,229,255,0.08); color: var(--accent); }
  .ob-btn {
    width:100%; padding:14px; border-radius: var(--r2);
    background: var(--accent); color: var(--bg);
    border:none; font-family:'Syne',sans-serif; font-size:.95rem; font-weight:700;
    cursor:pointer; transition:.2s; margin-top:8px;
  }
  .ob-btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
  .ob-btn.sec { background: transparent; color: var(--text2); border: 1px solid var(--border2); margin-top:0; }
  .ob-model-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .ob-model {
    border:1px solid var(--border2); border-radius: var(--r2); padding:14px;
    cursor:pointer; transition:.2s; background: var(--bg3);
  }
  .ob-model.sel { border-color: var(--accent); background: rgba(0,229,255,0.06); }
  .ob-model-name { font-size:.875rem; font-weight:700; margin-bottom:4px; }
  .ob-model-badge { font-size:.7rem; padding:2px 8px; border-radius:99px; display:inline-block; margin-bottom:6px; }
  .ob-model-badge.free { background:rgba(16,185,129,0.15); color:var(--accent3); }
  .ob-model-badge.paid { background:rgba(245,158,11,0.15); color:var(--accent4); }
  .ob-model-desc { font-size:.75rem; color:var(--text2); line-height:1.5; }
  .demo-banner {
    background: rgba(0,229,255,0.06); border:1px solid rgba(0,229,255,0.2);
    border-radius: var(--r2); padding:12px 16px; margin-bottom:20px;
    font-size:.8rem; color:var(--accent); display:flex; align-items:center; gap:8px;
  }

  /* \u2500\u2500\u2500 MAIN APP \u2500\u2500\u2500 */
  #app { display:none; flex-direction:column; min-height:100vh; }
  #app.visible { display:flex; }

  /* TOPBAR */
  .topbar {
    height:56px; background: rgba(6,8,16,0.9);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 20px; gap:16px;
    position:sticky; top:0; z-index:100;
    backdrop-filter: blur(12px);
  }
  .tb-logo { font-size:1rem; font-weight:800; display:flex; align-items:center; gap:8px; }
  .tb-logo span { color:var(--accent); }
  .tb-logo .dot { width:6px; height:6px; border-radius:50%; background:var(--accent3); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
  .tb-sep { flex:1; }
  .tb-user { display:flex; align-items:center; gap:10px; font-size:.85rem; }
  .tb-avatar {
    width:30px; height:30px; border-radius:50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display:flex; align-items:center; justify-content:center;
    font-size:.7rem; font-weight:700;
  }
  .tb-badge {
    padding:3px 10px; border-radius:99px; font-size:.7rem; font-weight:600;
    background: rgba(16,185,129,0.12); color:var(--accent3);
    border:1px solid rgba(16,185,129,0.25);
  }
  .tb-notif {
    width:32px; height:32px; border-radius: var(--r2);
    background: var(--bg2); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:.8rem; position:relative;
  }
  .tb-notif .badge { position:absolute; top:-4px; right:-4px; width:14px; height:14px; border-radius:50%; background:var(--danger); font-size:.6rem; display:flex; align-items:center; justify-content:center; }

  /* LAYOUT */
  .layout { display:flex; flex:1; overflow:hidden; }

  /* SIDEBAR */
  .sidebar {
    width:220px; background: var(--bg2);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column; padding:16px 0;
    flex-shrink:0; overflow-y:auto;
  }
  .sb-section { padding:0 12px; margin-bottom:20px; }
  .sb-section-label { font-size:.65rem; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); margin-bottom:8px; padding:0 8px; }
  .sb-item {
    display:flex; align-items:center; gap:10px;
    padding:9px 10px; border-radius: var(--r2);
    cursor:pointer; transition:.15s; font-size:.85rem; color:var(--text2);
    position:relative;
  }
  .sb-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .sb-item.active { background: rgba(0,229,255,0.08); color: var(--accent); }
  .sb-item .icon { font-size:.95rem; width:18px; text-align:center; }
  .sb-item .count {
    margin-left:auto; font-size:.7rem; padding:1px 6px; border-radius:99px;
    background: rgba(239,68,68,0.15); color:var(--danger); font-family:'JetBrains Mono',monospace;
  }
  .sb-item .count.green { background:rgba(16,185,129,0.1); color:var(--accent3); }

  /* INTEGRATIONS sidebar */
  .sb-integrations { padding:0 12px; margin-top:auto; }
  .sb-int-title { font-size:.65rem; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); margin-bottom:8px; padding:0 8px; }
  .int-chip {
    display:flex; align-items:center; gap:8px; padding:7px 10px;
    border-radius: var(--r2); font-size:.78rem; color:var(--text2);
    cursor:pointer; transition:.15s;
  }
  .int-chip:hover { background:rgba(255,255,255,0.04); }
  .int-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .int-dot.on { background:var(--accent3); box-shadow:0 0 6px var(--accent3); }
  .int-dot.off { background:var(--text3); }

  /* MAIN CONTENT */
  .main { flex:1; overflow-y:auto; padding:24px; background: var(--bg); }
  .page { display:none; }
  .page.active { display:block; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  /* CARDS */
  .card {
    background: var(--bg2); border:1px solid var(--border);
    border-radius: var(--r); padding:20px;
  }
  .card-title { font-size:.8rem; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text2); margin-bottom:16px; display:flex; align-items:center; gap:8px; }

  /* STAT CARDS */
  .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
  @media(max-width:900px) { .stats-grid { grid-template-columns:repeat(2,1fr); } }
  @media(max-width:500px) { .stats-grid { grid-template-columns:1fr 1fr; } }
  .stat-card {
    background: var(--bg2); border:1px solid var(--border);
    border-radius: var(--r); padding:18px 20px;
    position:relative; overflow:hidden; transition:.2s;
  }
  .stat-card:hover { border-color: var(--border2); transform:translateY(-2px); }
  .stat-card::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
    background: var(--accent-c, var(--accent));
  }
  .stat-label { font-size:.72rem; color:var(--text2); font-weight:600; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
  .stat-val { font-size:2rem; font-weight:800; font-family:'JetBrains Mono',monospace; color:var(--text); line-height:1; }
  .stat-sub { font-size:.75rem; color:var(--text3); margin-top:6px; }
  .stat-trend { font-size:.72rem; margin-top:6px; }
  .stat-trend.up { color:var(--accent3); }
  .stat-trend.down { color:var(--danger); }

  /* DASHBOARD GRID */
  .dash-grid { display:grid; grid-template-columns:2fr 1fr; gap:16px; }
  @media(max-width:900px) { .dash-grid { grid-template-columns:1fr; } }

  /* AGENT CHAT */
  .chat-wrap { display:grid; grid-template-columns:1fr 280px; gap:16px; height:calc(100vh - 130px); min-height:500px; }
  @media(max-width:900px) { .chat-wrap { grid-template-columns:1fr; } }
  .chat-panel { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); display:flex; flex-direction:column; overflow:hidden; }
  .chat-topbar { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
  .chat-agent-sel { display:flex; gap:6px; flex-wrap:wrap; }
  .agent-tab {
    padding:6px 12px; border-radius:99px; font-size:.75rem; font-weight:600;
    cursor:pointer; transition:.15s; border:1px solid var(--border);
    color:var(--text2); background: transparent;
  }
  .agent-tab.active { border-color:var(--accent); background:rgba(0,229,255,0.08); color:var(--accent); }
  .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:80%; }
  .msg.user { align-self:flex-end; }
  .msg.bot { align-self:flex-start; }
  .msg-bubble {
    padding:11px 14px; border-radius:14px; font-size:.85rem; line-height:1.6;
  }
  .msg.user .msg-bubble { background:rgba(0,229,255,0.1); border:1px solid rgba(0,229,255,0.2); color:var(--text); border-radius:14px 14px 4px 14px; }
  .msg.bot .msg-bubble { background:var(--bg3); border:1px solid var(--border); border-radius:14px 14px 14px 4px; }
  .msg-agent { font-size:.68rem; color:var(--text3); margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; }
  .msg-time { font-size:.65rem; color:var(--text3); margin-top:4px; font-family:'JetBrains Mono',monospace; }
  .msg-actions { display:flex; gap:6px; margin-top:6px; }
  .msg-action-btn {
    padding:3px 8px; border-radius:4px; font-size:.7rem; cursor:pointer;
    border:1px solid var(--border2); background:transparent; color:var(--text2); transition:.15s;
  }
  .msg-action-btn:hover { background:var(--bg2); color:var(--text); }
  .chat-input-row {
    padding:12px 16px; border-top:1px solid var(--border);
    display:flex; gap:10px; align-items:flex-end;
  }
  .chat-textarea {
    flex:1; background:var(--bg3); border:1px solid var(--border2);
    border-radius:var(--r2); padding:10px 14px; color:var(--text);
    font-family:'Syne',sans-serif; font-size:.85rem; resize:none;
    min-height:42px; max-height:120px; outline:none; transition:.2s;
  }
  .chat-textarea:focus { border-color:var(--accent); }
  .chat-send {
    padding:10px 18px; background:var(--accent); color:var(--bg);
    border:none; border-radius:var(--r2); cursor:pointer; font-family:'Syne',sans-serif;
    font-weight:700; font-size:.85rem; transition:.2s; flex-shrink:0;
  }
  .chat-send:hover { filter:brightness(1.1); }
  .chat-send:disabled { opacity:.4; cursor:not-allowed; }

  /* QUICK COMMANDS */
  .quick-cmds { display:flex; flex-direction:column; gap:6px; }
  .qcmd {
    padding:10px 12px; border-radius:var(--r2); border:1px solid var(--border);
    font-size:.78rem; cursor:pointer; transition:.15s; color:var(--text2); line-height:1.4;
  }
  .qcmd:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,0.04); }
  .qcmd-label { font-weight:700; color:var(--text); font-size:.75rem; }
  .qcmd-desc { color:var(--text3); font-size:.7rem; margin-top:2px; }

  /* CRM */
  .crm-toolbar { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .crm-search {
    flex:1; min-width:180px; background:var(--bg2); border:1px solid var(--border2);
    border-radius:var(--r2); padding:9px 14px; color:var(--text);
    font-family:'Syne',sans-serif; font-size:.85rem; outline:none; transition:.2s;
  }
  .crm-search:focus { border-color:var(--accent); }
  .btn {
    padding:9px 16px; border-radius:var(--r2); border:none; cursor:pointer;
    font-family:'Syne',sans-serif; font-weight:600; font-size:.82rem; transition:.2s;
  }
  .btn-primary { background:var(--accent); color:var(--bg); }
  .btn-primary:hover { filter:brightness(1.1); }
  .btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border2); }
  .btn-ghost:hover { background:rgba(255,255,255,0.04); color:var(--text); }
  .btn-danger { background:rgba(239,68,68,0.1); color:var(--danger); border:1px solid rgba(239,68,68,0.2); }
  .btn-sm { padding:6px 12px; font-size:.75rem; }
  .kanban { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
  @media(max-width:1000px) { .kanban { grid-template-columns:repeat(3,1fr); } }
  @media(max-width:700px) { .kanban { grid-template-columns:repeat(2,1fr); } }
  .kb-col { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:14px; min-height:300px; }
  .kb-col-title { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .kb-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .kb-cards { display:flex; flex-direction:column; gap:8px; min-height:60px; }
  .lead-card {
    background:var(--bg3); border:1px solid var(--border); border-radius:var(--r2);
    padding:11px 12px; cursor:pointer; transition:.15s;
  }
  .lead-card:hover { border-color:var(--border2); transform:translateY(-1px); }
  .lead-name { font-size:.85rem; font-weight:700; }
  .lead-co { font-size:.75rem; color:var(--text2); margin-top:2px; }
  .lead-score { font-size:.7rem; padding:2px 8px; border-radius:99px; display:inline-block; margin-top:6px; font-family:'JetBrains Mono',monospace; font-weight:600; }
  .score-hot { background:rgba(239,68,68,0.12); color:var(--danger); }
  .score-warm { background:rgba(245,158,11,0.12); color:var(--accent4); }
  .score-cold { background:rgba(148,163,184,0.1); color:var(--text2); }
  .score-closed { background:rgba(16,185,129,0.1); color:var(--accent3); }

  /* TASKS */
  .task-item {
    display:flex; align-items:center; gap:12px; padding:13px 16px;
    background:var(--bg2); border:1px solid var(--border); border-radius:var(--r2);
    margin-bottom:8px; transition:.15s;
  }
  .task-item:hover { border-color:var(--border2); }
  .task-check {
    width:18px; height:18px; border-radius:4px; border:1.5px solid var(--border2);
    cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:.15s;
  }
  .task-check.done { background:var(--accent3); border-color:var(--accent3); }
  .task-title { flex:1; font-size:.85rem; }
  .task-title.done { text-decoration:line-through; color:var(--text3); }
  .task-meta { display:flex; align-items:center; gap:8px; }
  .priority-badge { font-size:.68rem; padding:2px 7px; border-radius:99px; font-weight:600; }
  .p-high { background:rgba(239,68,68,0.1); color:var(--danger); }
  .p-med { background:rgba(245,158,11,0.1); color:var(--accent4); }
  .p-low { background:rgba(148,163,184,0.1); color:var(--text2); }
  .agent-badge { font-size:.68rem; padding:2px 7px; border-radius:99px; background:rgba(0,229,255,0.08); color:var(--accent); }

  /* AUDIT LOG */
  .log-item {
    display:flex; align-items:flex-start; gap:14px; padding:12px 0;
    border-bottom:1px solid var(--border);
  }
  .log-item:last-child { border-bottom:none; }
  .log-icon { width:32px; height:32px; border-radius:var(--r2); display:flex; align-items:center; justify-content:center; font-size:.8rem; flex-shrink:0; }
  .log-agent { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; }
  .log-action { font-size:.82rem; color:var(--text2); }
  .log-time { font-size:.68rem; font-family:'JetBrains Mono',monospace; color:var(--text3); margin-left:auto; flex-shrink:0; }
  .log-status { font-size:.65rem; padding:2px 7px; border-radius:99px; }
  .ls-ok { background:rgba(16,185,129,0.1); color:var(--accent3); }
  .ls-pend { background:rgba(245,158,11,0.1); color:var(--accent4); }
  .ls-err { background:rgba(239,68,68,0.1); color:var(--danger); }

  /* APPROVALS */
  .approval-card {
    background:var(--bg2); border:1px solid var(--border); border-radius:var(--r);
    padding:18px; margin-bottom:12px; transition:.15s;
  }
  .approval-card:hover { border-color:var(--border2); }
  .appr-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; }
  .appr-icon { width:36px; height:36px; border-radius:var(--r2); display:flex; align-items:center; justify-content:center; font-size:.9rem; flex-shrink:0; }
  .appr-title { font-size:.9rem; font-weight:700; margin-bottom:3px; }
  .appr-sub { font-size:.78rem; color:var(--text2); line-height:1.5; }
  .appr-actions { display:flex; gap:8px; }

  /* INTEGRATIONS PAGE */
  .int-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media(max-width:800px) { .int-grid { grid-template-columns:repeat(2,1fr); } }
  @media(max-width:500px) { .int-grid { grid-template-columns:1fr; } }
  .int-card {
    background:var(--bg2); border:1px solid var(--border); border-radius:var(--r);
    padding:18px; display:flex; align-items:flex-start; gap:14px; transition:.2s;
  }
  .int-card:hover { border-color:var(--border2); transform:translateY(-2px); }
  .int-icon { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
  .int-name { font-size:.9rem; font-weight:700; margin-bottom:3px; }
  .int-desc { font-size:.75rem; color:var(--text2); margin-bottom:10px; line-height:1.5; }
  .int-status { font-size:.7rem; padding:3px 9px; border-radius:99px; display:inline-block; font-weight:600; }
  .is-on { background:rgba(16,185,129,0.1); color:var(--accent3); }
  .is-off { background:rgba(148,163,184,0.1); color:var(--text2); }

  /* PRICING PAGE */
  .pricing-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; max-width:900px; }
  @media(max-width:800px) { .pricing-grid { grid-template-columns:1fr; max-width:400px; } }
  .price-card {
    background:var(--bg2); border:1px solid var(--border); border-radius:var(--r);
